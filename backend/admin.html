<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alleral Script Status</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1117;
      --panel: #171a22;
      --border: #2a3040;
      --text: #eef1f8;
      --muted: #9aa3b8;
      --accent: #6384ff;
      --working: #48c78e;
      --detected: #ffbd4d;
      --broken: #ff6074;
      --maintenance: #a78bfa;
      --testing: #45d1bf;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, system-ui, sans-serif;
      background: radial-gradient(circle at top, #171c28, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 32px 20px 48px; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .sub { color: var(--muted); margin-bottom: 24px; }
    .toolbar {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: end;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; margin-bottom: 20px;
    }
    label { display: grid; gap: 6px; font-size: 12px; color: var(--muted); }
    input, select, textarea, button {
      font: inherit; border-radius: 10px; border: 1px solid var(--border);
      background: #0d1017; color: var(--text); padding: 10px 12px;
    }
    textarea { min-height: 72px; resize: vertical; width: 100%; }
    button {
      background: linear-gradient(180deg, #6d8cff, #5576f0);
      border: none; cursor: pointer; font-weight: 600;
    }
    button.secondary { background: #222836; border: 1px solid var(--border); }
    .grid { display: grid; gap: 14px; }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px;
    }
    .card-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 10px; }
    .title { font-size: 18px; font-weight: 700; }
    .badge {
      padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .badge.working { background: rgba(72,199,142,.15); color: var(--working); }
    .badge.detected { background: rgba(255,189,77,.15); color: var(--detected); }
    .badge.broken { background: rgba(255,96,116,.15); color: var(--broken); }
    .badge.maintenance { background: rgba(167,139,250,.15); color: var(--maintenance); }
    .badge.testing { background: rgba(69,209,191,.15); color: var(--testing); }
    .meta { color: var(--muted); font-size: 13px; line-height: 1.5; }
    .message { margin-top: 10px; white-space: pre-wrap; }
    .editor { display: grid; gap: 10px; margin-top: 12px; }
    .row { display: grid; grid-template-columns: 160px 1fr; gap: 10px; align-items: center; }
    .toast {
      position: fixed; right: 20px; bottom: 20px; background: #101521;
      border: 1px solid var(--border); padding: 12px 14px; border-radius: 12px;
      opacity: 0; transform: translateY(8px); transition: .2s ease;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .error { color: #ff8a98; margin-top: 8px; min-height: 18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Alleral Script Status</h1>
    <p class="sub">Update what players see in-game. Changes apply to the loader manifest immediately.</p>

    <div class="toolbar">
      <label style="flex:1; min-width:220px;">
        Admin API key
        <input id="adminKey" type="password" placeholder="Same as ADMIN_API_KEY on relay" />
      </label>
      <button id="saveKey" class="secondary" type="button">Remember key</button>
      <button id="reload" type="button">Reload</button>
    </div>

    <div id="error" class="error"></div>
    <div id="grid" class="grid"></div>
  </div>
  <div id="toast" class="toast"></div>

  <script>
    const STATUSES = ["working", "detected", "broken", "maintenance", "testing"];
    const grid = document.getElementById("grid");
    const errorEl = document.getElementById("error");
    const toast = document.getElementById("toast");
    const adminKey = document.getElementById("adminKey");

    const saved = localStorage.getItem("alleral_admin_key");
    if (saved) adminKey.value = saved;

    document.getElementById("saveKey").onclick = () => {
      localStorage.setItem("alleral_admin_key", adminKey.value.trim());
      flash("Admin key saved locally");
    };
    document.getElementById("reload").onclick = loadScripts;

    function flash(text) {
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2200);
    }

    async function loadScripts() {
      errorEl.textContent = "";
      grid.innerHTML = "Loading...";
      const res = await fetch("/scripts");
      const data = await res.json();
      if (!data.ok) {
        errorEl.textContent = data.error || "Failed to load scripts";
        grid.innerHTML = "";
        return;
      }
      const scripts = data.scripts || {};
      grid.innerHTML = "";
      Object.keys(scripts).sort().forEach((id) => renderCard(id, scripts[id]));
    }

    function renderCard(id, entry) {
      const card = document.createElement("div");
      card.className = "card";
      const status = (entry.status || "working").toLowerCase();
      card.innerHTML = `
        <div class="card-head">
          <div>
            <div class="title">${entry.name || id}</div>
            <div class="meta">${id} · v${entry.version || "?"} · updated ${entry.updatedAt || "?"} by ${entry.updatedBy || "admin"}</div>
          </div>
          <span class="badge ${status}">${status}</span>
        </div>
        <div class="message">${entry.message || ""}</div>
        <div class="editor">
          <div class="row">
            <label>Status</label>
            <select data-field="status">${STATUSES.map((s) => `<option value="${s}" ${s===status?"selected":""}>${s}</option>`).join("")}</select>
          </div>
          <div class="row">
            <label>Version label</label>
            <input data-field="version" value="${entry.version || ""}" />
          </div>
          <div class="row" style="grid-template-columns:1fr;">
            <label>Message (shown in-game)</label>
            <textarea data-field="message">${entry.message || ""}</textarea>
          </div>
          <button type="button">Save ${entry.name || id}</button>
        </div>
      `;
      card.querySelector("button").onclick = () => saveScript(id, card);
      grid.appendChild(card);
    }

    async function saveScript(id, card) {
      errorEl.textContent = "";
      const key = adminKey.value.trim();
      if (!key) {
        errorEl.textContent = "Enter your admin API key first.";
        return;
      }
      const payload = {};
      card.querySelectorAll("[data-field]").forEach((el) => {
        payload[el.dataset.field] = el.value;
      });
      const res = await fetch(`/scripts/${encodeURIComponent(id)}`, {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json",
          "X-Admin-Key": key,
        },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        errorEl.textContent = data.error || `Save failed (${res.status})`;
        return;
      }
      flash(`Updated ${id} → ${payload.status}`);
      await loadScripts();
    }

    loadScripts();
  </script>
</body>
</html>
