name: Auto Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Build release tag and body
        id: info
        shell: bash
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:7}"

          TIMESTAMP=$(date -u +"%Y-%m-%d-%H%M%S")
          DISPLAY_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          TAG="auto-release-${TIMESTAMP}"

          COMMIT_MSG=$(git log -1 --pretty=%s)
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git log -1 --name-only --pretty=format:)

          BODY=$(cat <<EOF
          ## Auto Release - ${DISPLAY_DATE}

          **Commit:** \`${SHORT}\`
          **Message:** ${COMMIT_MSG}
          **Branch:** main

          ### Changed Files
          \`\`\`
          ${CHANGED_FILES}
          \`\`\`

          _Generated by GitHub Actions_
          EOF
          )

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "title=Auto Release - ${DISPLAY_DATE}" >> $GITHUB_OUTPUT

          # Write body to a file to avoid escaping issues
          echo "${BODY}" > release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: ${{ steps.info.outputs.title }}
          body_path: release_body.md
          draft: false
          prerelease: false
          generate_release_notes: false
