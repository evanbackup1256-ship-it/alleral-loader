[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["relay/**", "cfg/**", "go/**", "docker/**", "Dockerfile", "railway.toml", "hub/**", "games/**", "bootstrap.luau", "loader.luau", ".vscode/**", "maint/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
